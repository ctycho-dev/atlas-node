services:
  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: xray
    restart: unless-stopped
    command: run -c /etc/xray/config.json
    volumes:
      - ./xray:/etc/xray
    ports:
      - "443:443" # Map host port 443 to container port 443

  agent:
    image: node:22-alpine
    container_name: atlas-node-agent
    restart: unless-stopped
    working_dir: /app
    command: sh -c "apk add --no-cache docker-cli && npm install && npm start"
    volumes:
      - ./agent:/app
      - ./xray:/xray
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3000:3000"
    # Environment variables loaded from .env file in root directory
    environment:
      - AGENT_PORT=3000
      - API_SECRET=${API_SECRET}
      - XRAY_CONFIG_PATH=/xray/config.json
    depends_on:
      - xray
